<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente Optium Energía</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #F4F7F9; color: #1A1A1A; }
  h1 { color: #0B3D62; font-size: 22px; }
  #chat { background: white; border-radius: 10px; padding: 16px; min-height: 300px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .msg { margin: 10px 0; padding: 10px 14px; border-radius: 8px; line-height: 1.4; }
  .user { background: #0B3D62; color: white; text-align: right; }
  .bot { background: #EAF1F6; color: #1A1A1A; }
  .sources { font-size: 11px; color: #667; margin-top: 4px; }
  form { display: flex; gap: 8px; margin-top: 16px; }
  input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #CCC; }
  button { padding: 10px 18px; border: none; border-radius: 6px; background: #0B3D62; color: white; cursor: pointer; }
</style>
</head>
<body>
  <h1>Asistente virtual — Optium Energía</h1>
  <p>Pregunta sobre boletas, tarifas eléctricas o Consumo No Registrado (CNR).</p>
  <div id="chat"></div>
  <form id="form">
    <input id="question" placeholder="Escribe tu pregunta..." autocomplete="off" required>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('question');

    function addMsg(text, cls, sources) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      if (sources && sources.length) {
        const s = document.createElement('div');
        s.className = 'sources';
        s.textContent = 'Fuentes: ' + sources.join(', ');
        div.appendChild(s);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      addMsg(q, 'user');
      input.value = '';
      addMsg('Pensando...', 'bot');
      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        const data = await res.json();
        chat.lastChild.remove();
        if (data.error) {
          addMsg('Error: ' + data.error, 'bot');
        } else {
          addMsg(data.answer, 'bot', data.sources);
        }
      } catch (err) {
        chat.lastChild.remove();
        addMsg('Error de conexión con el servidor.', 'bot');
      }
    });
  </script>
</body>
</html>
